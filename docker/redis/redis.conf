# Redis configuration for Docker development

# Network
bind 0.0.0.0
port 6379
timeout 0
tcp-keepalive 300

# Memory management (optimized for development)
maxmemory 128mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Persistence (less frequent for development)
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Logging
loglevel notice
logfile ""

# Performance
tcp-backlog 511
databases 16
always-show-logo yes

# Client connections
maxclients 10000

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency monitoring
latency-monitor-threshold 100

# Memory optimization
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
